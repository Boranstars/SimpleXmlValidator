name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            cmake-preset: linux-vcpkg
            build-preset: linux-vcpkg-release
            artifact-name: SimpleXmlValidator-linux

          - os: windows-latest
            cmake-preset: windows-vcpkg
            build-preset: windows-vcpkg-release
            artifact-name: SimpleXmlValidator-windows

          - os: macos-latest
            cmake-preset: macos-vcpkg
            build-preset: macos-vcpkg-release
            artifact-name: SimpleXmlValidator-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (Linux / Windows)
        if: runner.os != 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: ${{ runner.os == 'Linux' && 'linux' || 'windows' }}
          target: desktop
          arch: ${{ runner.os == 'Linux' && 'gcc_64' || 'win64_msvc2019_64' }}
          cache: true
          cache-key-prefix: qt-5.15.2

      - name: Setup Homebrew paths
        if: runner.os == 'macOS'
        id: brew-paths
        run: echo "cellar=$(brew --prefix)/Cellar/qt@5" >> $GITHUB_OUTPUT

      - name: Cache Homebrew Qt5
        if: runner.os == 'macOS'
        uses: actions/cache/restore@v4
        id: brew-qt-cache
        with:
          path: ${{ steps.brew-paths.outputs.cellar }}
          key: brew-qt5-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Install Qt (macOS via Homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install qt@5
          brew link qt@5 2>/dev/null || brew link --force qt@5 2>/dev/null || true

      - name: Export VCPKG_ROOT and QT_ROOT
        shell: bash
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          if [ "$RUNNER_OS" = "macOS" ]; then
            QT_PREFIX="$(brew --prefix qt@5)"
            echo "QT_ROOT=$QT_PREFIX" >> "$GITHUB_ENV"
            echo "$QT_PREFIX/bin" >> "$GITHUB_PATH"
          else
            echo "QT_ROOT=$Qt5_DIR" >> "$GITHUB_ENV"
          fi
          echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/vcpkg-bincache" >> "$GITHUB_ENV"

      - name: Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libgl1-mesa-dev

      - name: Configure CMake
        shell: bash
        env:
          VCPKG_BINARY_SOURCES: "clear;default,readwrite"
        run: |
          mkdir -p "${{ github.workspace }}/vcpkg-bincache"
          cmake --preset ${{ matrix.cmake-preset }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build --preset ${{ matrix.build-preset }}

      # ── Packaging ────────────────────────────────────────────────────────────

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $buildDir = "out\build\windows-vcpkg\Release"
          $pkg = "package\SimpleXmlValidator"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item "$buildDir\SimpleXmlValidator.exe" $pkg
          Copy-Item "$buildDir\*.dll" $pkg -ErrorAction SilentlyContinue
          windeployqt --release --no-translations "$pkg\SimpleXmlValidator.exe"
          Compress-Archive -Path $pkg -DestinationPath SimpleXmlValidator-windows.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          macdeployqt out/build/macos-vcpkg/SimpleXmlValidator.app -dmg
          mv out/build/macos-vcpkg/SimpleXmlValidator.dmg SimpleXmlValidator-macos.dmg

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
               -O linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage \
               -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy linuxdeploy-plugin-qt

          mkdir -p AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          cat > AppDir/usr/share/applications/SimpleXmlValidator.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=SimpleXmlValidator
          Exec=SimpleXmlValidator
          Icon=SimpleXmlValidator
          Type=Application
          Categories=Development;Utility;
          DESKTOP

          convert -size 256x256 xc:'#336699' \
                  AppDir/usr/share/icons/hicolor/256x256/apps/SimpleXmlValidator.png

          QMAKE="$(which qmake)" \
          ./linuxdeploy \
            --appdir AppDir \
            --executable out/build/linux-vcpkg/SimpleXmlValidator \
            --desktop-file AppDir/usr/share/applications/SimpleXmlValidator.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/SimpleXmlValidator.png \
            --plugin qt \
            --output appimage

          mv SimpleXmlValidator*.AppImage SimpleXmlValidator-linux.AppImage

      # ── Upload build artifacts (passed to release job) ────────────────────

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: SimpleXmlValidator-windows.zip
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: SimpleXmlValidator-macos.dmg
          if-no-files-found: error

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: SimpleXmlValidator-linux.AppImage
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum \
            SimpleXmlValidator-linux.AppImage \
            SimpleXmlValidator-macos.dmg \
            SimpleXmlValidator-windows.zip \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/SimpleXmlValidator-linux.AppImage
            dist/SimpleXmlValidator-macos.dmg
            dist/SimpleXmlValidator-windows.zip
            dist/SHA256SUMS.txt
